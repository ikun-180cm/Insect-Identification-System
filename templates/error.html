<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: url("/static/bg-cangqiong.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            width: 460px;
            padding: 45px 35px;
            background: rgba(18, 22, 38, 0.88);
            border: 1px solid rgba(136, 132, 255, 0.5);
            border-radius: 14px;
            box-shadow: 0 0 35px rgba(120, 110, 255, 0.35);
            text-align: center;
        }
        .error-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff4191, #b166ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .error-desc {
            color: #e2e2ff;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .back-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(90deg, #ff4191, #b166ff);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .back-btn:hover {
            box-shadow: 0 0 16px rgba(255, 65, 145, 0.5);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <h1 class="error-title">提示</h1>
        <p class="error-desc">{{ message }}</p>
        <!-- 动态按钮：根据 back_url 跳转到指定页面 -->
        <button class="back-btn" onclick="location.href='{{ back_url or '/login' }}'">
            {{ btn_text or "返回" }}
        </button>
    </div>
</body>
</html>
