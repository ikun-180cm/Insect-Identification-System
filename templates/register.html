{% extends "base.html" %}

{% block title %}注册 - 苍穹车道检测系统{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8">
    <div class="glass p-8 sm:p-10 md:p-12 rounded-3xl shadow-2xl w-full max-w-md">
        <h2 class="text-4xl sm:text-5xl font-bold text-center mb-10 glow-text tracking-wide">
            🌠 加入星河
        </h2>

        <form method="post" class="space-y-6" onsubmit="return checkInput()">
            <div>
                <input type="text" name="username" placeholder="用户名 / Username"
                       class="w-full px-5 py-4 bg-white/10 border border-white/30 rounded-2xl focus:outline-none focus:border-purple-400/80 focus:ring-2 focus:ring-purple-500/40 text-lg text-white placeholder:text-white/85 transition duration-200">
            </div>
            <div>
                <input type="password" name="password" placeholder="设置密码 / Password"
                       class="w-full px-5 py-4 bg-white/10 border border-white/30 rounded-2xl focus:outline-none focus:border-purple-400/80 focus:ring-2 focus:ring-purple-500/40 text-lg text-white placeholder:text-white/85 transition duration-200">
            </div>
            <button type="submit"
                    class="w-full py-4 btn-gradient text-xl font-semibold rounded-2xl transition-all hover:brightness-110 active:scale-95 shadow-xl glow-text">
                开启我的星之旅 ✨
            </button>
        </form>

        <div class="text-center mt-8 text-lg">
            <a href="/login" class="text-purple-300 hover:text-purple-100 underline transition">
                已有账号？立即登录 ←
            </a>
        </div>
    </div>
</div>

<script>
// 轻量级前端验证：检查输入框是否为空
function checkInput() {
    const user = document.querySelector('input[name="username"]').value.trim();
    const pwd = document.querySelector('input[name="password"]').value.trim();

    if (user === "" || pwd === "") {
        const tip = document.createElement("div");
        tip.innerText = "请输入文本";
        tip.style.cssText = `
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 32px;
            background: rgba(255, 80, 160, 0.35);
            color: #ffffff;
            border-radius: 60px;
            font-size: 19px;
            font-weight: 600;
            z-index: 9999;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 25px rgba(255,80,160,0.6);
            opacity: 0;
            transition: all 0.5s ease;
        `;
        document.body.appendChild(tip);

        setTimeout(() => {
            tip.style.opacity = "1";
            tip.style.transform = "translateX(-50%) scale(1.1)";
        }, 10);

        let breath = 1;
        const breathing = setInterval(() => {
            breath = breath === 1 ? 1.12 : 1;
            tip.style.transform = `translateX(-50%) scale(${breath})`;
        }, 700);

        setTimeout(() => {
            tip.style.opacity = "0";
            setTimeout(() => {
                document.body.removeChild(tip);
                clearInterval(breathing);
            }, 500);
        }, 2800);

        return false;
    }
    return true;
}
</script>

{% endblock %}
